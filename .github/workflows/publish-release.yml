name: Publish Release

# Creates a GitHub Release whenever a version tag is pushed.
# Apps check this release (and pyproject.toml on main) to show the update banner.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Read version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Picking Barcode Scanner v${{ steps.version.outputs.version }}
          generate_release_notes: true
          body: |
            ## Picking Barcode Scanner v${{ steps.version.outputs.version }}

            A new version is available. Update your desktop/tablet install to get the latest picking helper, scan, and sync improvements.

            Repository: https://github.com/dackzui/Fulfilment-Checker
